name: Sync model images from Airtable

# Two ways this workflow starts:
#  1. repository_dispatch - the Airtable automations POST to GitHub's API
#     (the "watcher" fires after an image changes; the "backlog" fires on a schedule)
#  2. workflow_dispatch - a manual "Run workflow" button in the GitHub Actions tab
on:
  repository_dispatch:
    types: [airtable-image-sync]
  workflow_dispatch:
    inputs:
      mode:
        description: "sync = Pending records only; backlog = everything not yet Published"
        type: choice
        options:
          - backlog
          - sync
        default: backlog

# Only one sync runs at a time. If several dispatches arrive at once, they
# queue rather than clash. A superseded queued run is harmless because every
# run sweeps ALL records that need processing, not just one.
concurrency:
  group: airtable-image-sync
  cancel-in-progress: false

# Lets the built-in GITHUB_TOKEN push the processed images back to this repo.
permissions:
  contents: write

# ======================= CONFIG - EDIT THESE =======================
env:
  BASE_ID: appejjH7UYQ01JSki      # <-- Models base ID (starts with app)
  TABLE_ID: tbllo1L2GB6Jlm8mN     # <-- Models table ID (starts with tbl)
  FLD_ATTACH: fldYyOhu2nRYOYe0O   # <-- attachment field holding the source image
  FLD_NAME: fldBIVuL8qhhGwdau     # <-- model name field (used for the filename slug)
  FLD_URL: fldCje8TL4dwVStAx      # <-- URL field the permanent link is written to
  FLD_STATUS: fldaCwck62QT6vGgg   # <-- single select: Pending / Published / Rejected
  FLD_NOTE: fldJceyNYs1kO3acS     # <-- long text field for sync notes
  FLD_THUMB: fldFiT2rZg9gAOx1w    # <-- URL field for the 80x80 thumbnail link
  THUMB_EDGE: "80"                # <-- thumbnail square size, px
  BRANCH: main                    # <-- default branch of this repo
  MAX_EDGE: "800"                 # <-- longest edge of processed images, px
  JPEG_QUALITY: "90"              # <-- JPEG output quality (1-100)
# ===================================================================

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Process images
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          MODE: ${{ github.event.client_payload.mode || inputs.mode || 'sync' }}
        run: node scripts/process-images.mjs

      - name: Commit and push processed images
        run: |
          git config user.name "airtable-image-sync[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add images/
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Sync model images from Airtable"
            for attempt in 1 2 3; do
              if git push; then
                echo "Pushed on attempt ${attempt}."
                exit 0
              fi
              echo "Push rejected (attempt ${attempt}) — remote moved ahead; rebasing and retrying…"
              git pull --rebase origin "${BRANCH}"
              sleep 2
            done
            echo "Push still failing after 3 attempts." >&2
            exit 1
          fi

      - name: Write results back to Airtable
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: node scripts/writeback-airtable.mjs
